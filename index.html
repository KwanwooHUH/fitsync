<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="version" content="3.0.0">
<link rel="manifest" href="/fitsync/manifest.json">
<meta name="theme-color" content="#0d0f14">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PT 스케줄 관리 - FitSync Pro</title>

<!-- Firebase SDK (compat, iOS Safari 호환 및 인증/스토어 지원) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" crossorigin="anonymous"></script>

<script>
(function() {
  // 기존 프로젝트의 Firebase 설정 유지
  const firebaseConfig = {
    apiKey:            "AIzaSyAmCrwZ1KToKdnHJky5OX3JyD88ZCrzTBE",
    authDomain:        "fitsync-9f15d.firebaseapp.com",
    projectId:         "fitsync-9f15d",
    storageBucket:     "fitsync-9f15d.firebasestorage.app",
    messagingSenderId: "696294571061",
    appId:             "1:696294571061:web:1beecc54a3734aefc1857c"
  };
  firebase.initializeApp(firebaseConfig);
  
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  window._db = db;
  window._auth = auth;

  // iOS Safari 호환 설정
  try {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
      db.settings({ experimentalForceLongPolling: true, merge: true });
    }
  } catch(e) { console.warn("iOS settings error:", e); }

  // 글로벌 데이터 구조 선언
  window.data = {
    members: [],
    trainerSlots: [],
    reservations: [],
    workoutLogs: [],
    conditionLogs: [],
    changeRequests: [],
    settings: {}
  };
  window.state = {
    role: 'member', // 'trainer' or 'member'
    selectedMember: null,
    selectedDate: new Date().toISOString().split('T')[0]
  };
  window.currentUser = null;
  window._fbReady = false;

  // 각 컬렉션 로딩 상태 추적
  const loadingStatus = {
    members: false,
    trainerSlots: false,
    reservations: false,
    workoutLogs: false,
    conditionLogs: false,
    changeRequests: false,
    settings: false
  };

  function checkAllLoaded() {
    if (Object.values(loadingStatus).every(status => status === true)) {
      window._fbReady = true;
      const loader = document.getElementById('fbLoader');
      if (loader) loader.style.display = 'none';
      if (typeof window.renderAll === 'function') {
        window.renderAll();
      }
    }
  }

  // ── 데이터 독립 컬렉션 분리 및 실시간 동기화 (Multi-Collection Listening) ──
  db.collection('members').onSnapshot(snap => {
    window.data.members = [];
    snap.forEach(doc => {
      const d = doc.data();
      window.data.members.push({ ...d, id: +d.id, totalPt: +d.totalPt, usedPt: +d.usedPt });
    });
    loadingStatus.members = true;
    checkAllLoaded();
  }, err => console.error("Members sync error:", err));

  db.collection('trainerSlots').onSnapshot(snap => {
    window.data.trainerSlots = [];
    snap.forEach(doc => {
      const d = doc.data();
      window.data.trainerSlots.push({ ...d, hour: +d.hour });
    });
    loadingStatus.trainerSlots = true;
    checkAllLoaded();
  }, err => console.error("Slots sync error:", err));

  db.collection('reservations').onSnapshot(snap => {
    window.data.reservations = [];
    snap.forEach(doc => {
      const d = doc.data();
      window.data.reservations.push({
        ...d, id: +d.id,
        memberId: d.memberId != null ? +d.memberId : null,
        hour: +d.hour
      });
    });
    window.rid = (window.data.reservations.reduce((mx, r) => Math.max(mx, r.id || 0), 0)) + 1;
    loadingStatus.reservations = true;
    checkAllLoaded();
  }, err => console.error("Reservations sync error:", err));

  db.collection('workoutLogs').onSnapshot(snap => {
    window.data.workoutLogs = [];
    snap.forEach(doc => { window.data.workoutLogs.push(doc.data()); });
    loadingStatus.workoutLogs = true;
    checkAllLoaded();
  }, err => console.error("WorkoutLogs sync error:", err));

  db.collection('conditionLogs').onSnapshot(snap => {
    window.data.conditionLogs = [];
    snap.forEach(doc => { window.data.conditionLogs.push(doc.data()); });
    loadingStatus.conditionLogs = true;
    checkAllLoaded();
  }, err => console.error("ConditionLogs sync error:", err));

  db.collection('changeRequests').onSnapshot(snap => {
    window.data.changeRequests = [];
    snap.forEach(doc => {
      const d = doc.data();
      window.data.changeRequests.push({
        ...d, id: +d.id, resId: +d.resId,
        memberId: d.memberId != null ? +d.memberId : null,
        reqHour: d.reqHour != null ? +d.reqHour : null
      });
    });
    window.changeReqId = (window.data.changeRequests.reduce((mx, c) => Math.max(mx, c.id || 0), 0)) + 1;
    loadingStatus.changeRequests = true;
    checkAllLoaded();
  }, err => console.error("ChangeRequests sync error:", err));

  db.collection('settings').doc('global').onSnapshot(doc => {
    window.data.settings = doc.exists ? doc.data() : {};
    loadingStatus.settings = true;
    checkAllLoaded();
  }, err => console.error("Settings sync error:", err));

  // ── 개별 문서 단위 스마트 저장 함수 (기존 인터페이스 호환 보장) ──
  window._fbSave = async (payload) => {
    try {
      const batch = db.batch();

      // 1. members 저장
      if (payload.members) {
        payload.members.forEach(m => {
          const ref = db.collection('members').doc(String(m.id));
          batch.set(ref, m);
        });
      }
      // 2. reservations 저장
      if (payload.reservations) {
        payload.reservations.forEach(r => {
          const ref = db.collection('reservations').doc(String(r.id));
          batch.set(ref, r);
        });
      }
      // 3. trainerSlots 저장 (날짜와 시간 조합으로 고유 ID 생성)
      if (payload.trainerSlots) {
        payload.trainerSlots.forEach(s => {
          const ref = db.collection('trainerSlots').doc(`${s.date}_${s.hour}`);
          batch.set(ref, s);
        });
      }
      // 4. changeRequests 저장
      if (payload.changeRequests) {
        payload.changeRequests.forEach(c => {
          const ref = db.collection('changeRequests').doc(String(c.id));
          batch.set(ref, c);
        });
      }
      // 5. settings 저장
      if (payload.settings) {
        const ref = db.collection('settings').doc('global');
        batch.set(ref, payload.settings);
      }

      await batch.commit();
      console.log("독립 컬렉션 배치 업데이트 완료");
    } catch (e) {
      console.error("배치 저장 도중 오류 발생:", e);
    }
  };

  // ── Firebase Authentication 상태 변화 감지 및 역할 매핑 ──
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      // 로그인 완료 상태
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (userDoc.exists) {
        const profile = userDoc.data();
        window.currentUser = {
          uid: user.uid,
          email: user.email,
          role: profile.role,
          memberId: profile.memberId || null,
          name: profile.name || user.email.split('@')[0]
        };

        // 전역 상태에 반영
        window.state.role = profile.role;
        if (profile.role === 'trainer') {
          window.state.selectedMember = null;
        } else {
          window.state.selectedMember = profile.memberId;
        }
      } else {
        // 회원정보가 Firestore에 없는 신규 유저 처리용 디폴트 세팅
        window.currentUser = {
          uid: user.uid,
          email: user.email,
          role: 'member',
          memberId: null,
          name: user.email.split('@')[0]
        };
        window.state.role = 'member';
      }
      
      document.getElementById('authView').style.display = 'none';
      document.getElementById('mainAppContainer').style.display = 'block';
      
      const badge = document.getElementById('loginUserBadge');
      if (badge) {
        badge.textContent = window.currentUser.role === 'trainer' ? '🏋️ 트레이너 님' : `👤 회원: ${window.currentUser.name} 님`;
      }
      
      if (typeof window.renderAll === 'function') window.renderAll();
    } else {
      // 로그아웃 상태 -> 인증 화면 강제 표시
      window.currentUser = null;
      document.getElementById('mainAppContainer').style.display = 'none';
      document.getElementById('authView').style.display = 'flex';
    }
  });

})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --surface2: #1e2433;
    --border: #2a3040;
    --accent: #4fffb0;
    --accent2: #ff4f7b;
    --accent3: #4fb8ff;
    --text: #e8edf5;
    --text-muted: #6b7a99;
    --text-dim: #3d4a63;
    --trainer: #4fb8ff;
    --member: #4fffb0;
    --danger: #ff4f7b;
    --warning: #ffb84f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH VIEW DESIGN ── */
  #authView {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0d0f14 0%, #161923 100%);
    padding: 20px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 400px;
    padding: 32px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  .auth-logo {
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 24px;
  }
  .auth-logo span { color: var(--accent); }

  .auth-tabs {
    display: flex;
    background: var(--bg);
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .auth-tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 10px 0;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
    transition: all 0.2s;
  }
  .auth-tab-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* ── MAIN LAYOUT & APP ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .user-meta-zone {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #loginUserBadge {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .app { display: flex; height: calc(100vh - 64px); }

  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-members-wrap { flex: 1; overflow-y: auto; padding: 10px 0; }

  .main { flex: 1; overflow-y: auto; padding: 32px; }

  /* 기존 UI 컴포넌트 클래스 호환 */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }

  .schedule-grid { display: grid; grid-template-columns: 60px 1fr; }
  .time-label { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 16px; padding-top: 8px; font-size: 12px; color: var(--text-dim); font-family: 'Space Grotesk', sans-serif; }
  .slots-col { border-left: 1px solid var(--border); }
  .slot { height: 60px; border-bottom: 1px solid var(--border); padding: 4px 8px; position: relative; cursor: pointer; }
  .slot:hover { background: var(--surface2); }

  .open-slot { position: absolute; left: 8px; right: 8px; top: 4px; bottom: 4px; border-radius: 8px; border: 1.5px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-dim); }
  .open-slot:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,255,176,0.05); }

  .event { position: absolute; left: 8px; right: 8px; top: 4px; bottom: 4px; border-radius: 8px; padding: 8px 12px; font-size: 12px; }
  .event.confirmed { background: rgba(79,255,176,0.15); border-left: 4px solid var(--member); }
  .event.pending { background: rgba(79,184,255,0.15); border-left: 4px solid var(--trainer); }
  .event-name { font-weight: 700; color: var(--text); }

  /* ── 폼 구성 요소 ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
  .form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0d0f14; width: 100%; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-logout { background: rgba(255,79,123,0.1); color: var(--danger); border: 1px solid rgba(255,79,123,0.2); padding: 6px 14px; border-radius: 20px; }
  .btn-logout:hover { background: rgba(255,79,123,0.2); }

  /* ── LOADER ── */
  #fbLoader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <!-- 전역 로더 -->
  <div id="fbLoader">
    <div class="spinner"></div>
    <div style="color: var(--text-muted); font-size: 14px;">데이터베이스 보완 커넥터 연결 중...</div>
  </div>

  <!-- 1. Firebase Authentication 뷰존 -->
  <div id="authView">
    <div class="auth-card">
      <div class="auth-logo">FITSYNC<span>.PRO</span></div>
      
      <div class="auth-tabs">
        <button id="tabLogin" class="auth-tab-btn active" onclick="switchAuthMode('login')">로그인</button>
        <button id="tabRegister" class="auth-tab-btn" onclick="switchAuthMode('register')">신규 등록</button>
      </div>

      <!-- 로그인 / 회원가입 통합 폼 -->
      <form id="authForm" onsubmit="handleAuthSubmit(event)">
        <div class="form-group">
          <label class="form-label">이메일 주소</label>
          <input type="email" id="authEmail" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="authPassword" class="form-input" placeholder="••••••••" required>
        </div>
        
        <!-- 회원가입 시 활성화되는 확장 프로필 항목 -->
        <div id="registerExtraFields" style="display: none; border-top: 1px dashed var(--border); padding-top: 16px; margin-top: 16px;">
          <div class="form-group">
            <label class="form-label">이름 / 트레이너명</label>
            <input type="text" id="authName" class="form-input" placeholder="홍길동">
          </div>
          <div class="form-group">
            <label class="form-label">계정 권한 타입</label>
            <select id="authRole" class="form-select" onchange="toggleRoleRegisterField()">
              <option value="member">일반 회원 (Member)</option>
              <option value="trainer">트레이너 (Trainer)</option>
            </select>
          </div>
          <div class="form-group" id="memberIdField">
            <label class="form-label">매핑할 회원고유ID 번호 (숫자)</label>
            <input type="number" id="authMemberId" class="form-input" placeholder="예: 1">
          </div>
        </div>

        <button type="submit" id="authSubmitBtn" class="btn btn-primary" style="margin-top: 12px;">로그인</button>
      </form>
    </div>
  </div>

  <!-- 2. 어플리케이션 메인 컨테이너 -->
  <div id="mainAppContainer" style="display: none;">
    <header>
      <div class="logo">FITSYNC<span>.PRO</span></div>
      <div class="user-meta-zone">
        <div id="loginUserBadge">불러오는 중...</div>
        <button class="btn btn-logout" onclick="handleLogout()">로그아웃</button>
      </div>
    </header>

    <div class="app">
      <!-- 사이드바 부 영역 -->
      <div class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
          <h3 style="font-size: 14px; font-weight: 700; color: var(--text);">📅 일정 및 필터</h3>
        </div>
        <div class="sidebar-members-wrap" id="sidebarMembers">
          <!-- 스크립트 동적 주입 스페이스 -->
        </div>
      </div>

      <!-- 메인 콘텐츠 영역 -->
      <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <div>
            <h2 id="currentDateTitle" style="font-size: 24px; font-weight: 700;">오늘의 PT 스케줄</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">인증된 계정 권한 전용 타임라인 리스트</p>
          </div>
          <button class="btn btn-secondary" style="width: auto;" onclick="openQuickReservationModal()">⚡ 신규 세션 등록</button>
        </div>

        <!-- 핵심 통계 지표 그리드 -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">총 등록 회원 수</div>
            <div class="stat-value" id="statTotalMembers">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">금일 배정 세션</div>
            <div class="stat-value" id="statTodaySessions">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">대기 중인 변경 요청</div>
            <div class="stat-value" id="statPendingRequests">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">남은 PT 세션 평균</div>
            <div class="stat-value" id="statAvgSessions">0회</div>
          </div>
        </div>

        <!-- 타임 스케줄 뷰보드 -->
        <div class="schedule-grid" id="scheduleTimeline">
          <!-- 시간대 루프 생성 스페이스 (06시 ~ 23시) -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let authMode = 'login';

    function switchAuthMode(mode) {
      authMode = mode;
      document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
      document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
      document.getElementById('registerExtraFields').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('authSubmitBtn').textContent = mode === 'login' ? '로그인' : '신규 계정 생성 및 가입';
    }

    function toggleRoleRegisterField() {
      const role = document.getElementById('authRole').value;
      document.getElementById('memberIdField').style.display = role === 'member' ? 'block' : 'none';
    }

    async function handleAuthSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;

      try {
        if (authMode === 'login') {
          await window._auth.signInWithEmailAndPassword(email, password);
          alert("성공적으로 로그인되었습니다.");
        } else {
          // 회원가입 프로세스
          const name = document.getElementById('authName').value || email.split('@')[0];
          const role = document.getElementById('authRole').value;
          const memberId = document.getElementById('authMemberId').value ? parseInt(document.getElementById('authMemberId').value) : null;

          const cred = await window._auth.createUserWithEmailAndPassword(email, password);
          
          // Firestore users 컬렉션에 독립 프로필 정보 기록 설정
          await window._db.collection('users').doc(cred.user.uid).set({
            uid: cred.user.uid,
            email: email,
            name: name,
            role: role,
            memberId: memberId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          alert("회원가입 및 권한 프로필 생성이 완료되었습니다.");
        }
      } catch (err) {
        alert("인증 오류 처리 실패: " + err.message);
      }
    }

    function handleLogout() {
      if(confirm("로그아웃 하시겠습니까?")) {
        window._auth.signOut();
      }
    }

    // ── 비즈니스 로직 렌더링 엔진 (기존 레거시 렌더링 호환 브릿지 구축) ──
    window.renderAll = function() {
      if (!window._fbReady) return;

      // 대시보드 스태츠 업데이트
      document.getElementById('statTotalMembers').textContent = window.data.members.length;
      
      const todayStr = window.state.selectedDate;
      const todaySessions = window.data.reservations.filter(r => r.date === todayStr);
      document.getElementById('statTodaySessions').textContent = todaySessions.length;
      
      const pendingReqs = window.data.changeRequests.filter(c => c.status === 'pending');
      document.getElementById('statPendingRequests').textContent = pendingReqs.length;

      // 타임라인 그리기 스페이스 구조화
      const timeline = document.getElementById('scheduleTimeline');
      timeline.innerHTML = '';

      // 6시부터 22시까지 타임슬롯 빌더
      for (let h = 6; h <= 22; h++) {
        const hourStr = String(h).padStart(2, '0') + ':00';
        
        const timeLabel = document.createElement('div');
        timeLabel.className = 'time-label';
        timeLabel.textContent = hourStr;

        const slotsCol = document.createElement('div');
        slotsCol.className = 'slots-col';

        const slot = document.createElement('div');
        slot.className = 'slot';
        
        // 당일 세션 검색 및 주입
        const matchedRes = todaySessions.find(r => +r.hour === h);
        if (matchedRes) {
          const mInfo = window.data.members.find(m => +m.id === +matchedRes.memberId);
          const ev = document.createElement('div');
          ev.className = `event ${matchedRes.status || 'confirmed'}`;
          ev.innerHTML = `<div class="event-name">${mInfo ? mInfo.name : '지정 회원'}</div><div style="font-size:10px; color:var(--text-muted);">PT 세션 완료 조율 상태</div>`;
          slot.appendChild(ev);
        } else {
          const openSl = document.createElement('div');
          openSl.className = 'open-slot';
          openSl.textContent = '+ 공석 스케줄 배정 가능';
          openSl.onclick = () => openQuickReservationModal(h);
          slot.appendChild(openSl);
        }

        slotsCol.appendChild(slot);
        timeline.appendChild(timeLabel);
        timeline.appendChild(slotsCol);
      }

      // 사이드바 멤버 리스트 주입
      const sidebarMembers = document.getElementById('sidebarMembers');
      sidebarMembers.innerHTML = '';
      window.data.members.forEach(m => {
        const item = document.createElement('div');
        item.className = 'form-group' + (window.state.selectedMember === m.id ? ' selected' : '');
        item.style.padding = '10px 20px';
        item.style.borderBottom = '1px solid var(--border)';
        item.innerHTML = `<span style="font-weight:600; color:var(--accent);">👤 ${m.name}</span> <small style="color:var(--text-muted); float:right;">잔여 ${m.totalPt - m.usedPt}회</small>`;
        sidebarMembers.appendChild(item);
      });
    };

    function openQuickReservationModal(hour = 12) {
      const targetMember = window.state.selectedMember || (window.data.members[0] ? window.data.members[0].id : null);
      if(!targetMember) {
        alert("등록된 회원이 없습니다. 먼저 회원 명단을 추가해주세요.");
        return;
      }
      
      const newRes = {
        id: window.rid || 1,
        memberId: targetMember,
        date: window.state.selectedDate,
        hour: hour,
        status: 'confirmed'
      };

      if(confirm(`${window.state.selectedDate} ${hour}시에 예약을 추가하시겠습니까?`)) {
        window.data.reservations.push(newRes);
        window._fbSave(window.data);
      }
    }
  </script>
</body>
</html>
